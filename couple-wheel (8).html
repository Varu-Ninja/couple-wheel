<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Couple Name Wheel</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,400&family=DM+Sans:wght@300;400;500;600;900&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0A0A0A;
    --surface: #141414;
    --border: rgba(255,255,255,0.07);
    --text: #F0EDE8;
    --text-mid: #9A9590;
    --text-soft: #4A4540;
    --boy: #38BDF8;
    --girl: #F472B6;
  }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
  .page { max-width:1280px; margin:0 auto; padding:3rem 1.5rem 4rem; padding-right:52px; }
  @media(min-width:700px){ .page{ padding-right:1.5rem; } }

  header { text-align:center; margin-bottom:3rem; }
  .eyebrow { font-size:10px; font-weight:500; letter-spacing:0.2em; text-transform:uppercase; color:var(--text-soft); margin-bottom:0.6rem; }
  h1 { font-family:'Playfair Display',serif; font-size:clamp(2rem,5vw,3rem); font-weight:500; line-height:1.15; color:var(--text); margin-bottom:0.6rem; }
  h1 em { font-style:italic; color:var(--girl); }
  .subtitle { font-size:14px; font-weight:300; color:var(--text-mid); }
  .header-divider { width:40px; height:1px; margin:1.25rem auto 0; background:linear-gradient(90deg,transparent,var(--text-soft),transparent); }

  .grid { display:grid; grid-template-columns:1fr 1fr; gap:1.25rem; margin-bottom:1.25rem; align-items:stretch; }
  @media(max-width:640px){ .grid{ grid-template-columns:1fr; } }

  .card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:1.4rem; display:flex; flex-direction:column; gap:14px; height:100%; }
  .card-header { display:flex; align-items:center; gap:10px; }
  .card-icon { width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
  .card-icon-boy { background:rgba(56,189,248,0.12); color:var(--boy); }
  .card-icon-girl { background:rgba(244,114,182,0.12); color:var(--girl); }
  .card-icon-rand { background:linear-gradient(135deg,#EC4899,#8B5CF6); color:#fff; }
  .card-title { font-family:'Playfair Display',serif; font-size:17px; font-weight:500; color:var(--text); }
  .name-count { font-size:11px; font-weight:700; padding:2px 9px; border-radius:20px; margin-left:auto; line-height:1.6; }
  .name-count-boy { background:rgba(56,189,248,0.15); color:var(--boy); }
  .name-count-girl { background:rgba(244,114,182,0.15); color:var(--girl); }

  .input-row { display:flex; gap:6px; }
  .input-row input { flex:1; font-family:'DM Sans',sans-serif; font-size:13px; padding:10px 12px; border:1px solid var(--border); border-radius:10px; background:#1C1C1C; color:var(--text); outline:none; transition:border-color .15s; min-width:0; -webkit-appearance:none; appearance:none; }
  .input-row input::placeholder { color:var(--text-soft); }
  .input-row input:focus { border-color:rgba(255,255,255,0.2); }
  .add-btn { font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; padding:10px 14px; border-radius:10px; cursor:pointer; border:1px solid var(--border); background:#1C1C1C; color:var(--text); transition:background .12s; white-space:nowrap; -webkit-tap-highlight-color:transparent; }
  .add-btn:hover { background:#252525; }
  .add-btn:active { background:#2a2a2a; }

  .tags { display:flex; flex-wrap:wrap; gap:5px; min-height:28px; max-height:88px; overflow-y:auto; }
  .tag { display:inline-flex; align-items:center; gap:4px; font-size:11px; padding:3px 10px; border-radius:20px; line-height:1.4; }
  .tag-boy { background:rgba(56,189,248,0.1); color:#7DD3FC; }
  .tag-girl { background:rgba(244,114,182,0.1); color:#F9A8D4; }
  .tag-x { cursor:pointer; opacity:0.4; font-size:14px; line-height:1; padding:0 2px; }
  .tag-x:hover { opacity:1; }

  .wheel-area { display:flex; flex-direction:column; align-items:center; flex:1; justify-content:center; }
  .pointer-wrap { height:18px; display:flex; justify-content:center; transition:width .15s; }
  .pointer { width:0; height:0; border-left:9px solid transparent; border-right:9px solid transparent; }
  .pointer-boy { border-top:16px solid #E0F2FE; }
  .pointer-girl { border-top:16px solid #FCE7F3; }
  canvas { display:block; max-width:100%; }

  .result-area { margin-top:10px; text-align:center; display:flex; flex-direction:column; align-items:center; gap:5px; min-height:72px; justify-content:center; }
  .result-hint { font-size:10px; font-weight:500; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-soft); }
  .result-name { font-family:'Playfair Display',serif; font-size:22px; font-weight:500; color:var(--text); }
  .result-name.pop-in { animation:randomResultPop .44s ease forwards; }
  @keyframes randomResultPop { 0% { transform: translateY(-10px) scale(0.9); opacity:0; }
                              60% { transform: translateY(4px) scale(1.05); opacity:1; }
                             100% { transform: translateY(0) scale(1); opacity:1; } }
  .remove-winner-btn { font-family:'DM Sans',sans-serif; font-size:11px; font-weight:500; padding:6px 14px; border-radius:20px; cursor:pointer; border:1px solid var(--border); background:#1C1C1C; color:var(--text-mid); display:none; align-items:center; gap:4px; transition:background .12s,color .12s,border-color .12s; -webkit-tap-highlight-color:transparent; }
  .remove-winner-btn:hover { background:rgba(239,68,68,0.12); color:#FCA5A5; border-color:rgba(239,68,68,0.25); }
  .remove-winner-btn.visible { display:inline-flex; }

  .spin-btn { font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; padding:12px 0; border:none; border-radius:12px; cursor:pointer; width:100%; transition:opacity .15s,transform .1s; -webkit-tap-highlight-color:transparent; }
  .spin-btn:active { transform:scale(0.98); }
  .spin-btn:disabled { opacity:0.3; cursor:not-allowed; }
  .spin-boy { background:var(--boy); color:#0A0A0A; }
  .spin-girl { background:var(--girl); color:#0A0A0A; }

  .bottom { display:flex; flex-direction:column; align-items:center; gap:16px; }
  .spin-both-btn { font-family:'Playfair Display',serif; font-style:italic; font-size:16px; padding:13px 52px; border:none; border-radius:14px; cursor:pointer; background:var(--text); color:var(--bg); transition:opacity .15s,transform .1s; -webkit-tap-highlight-color:transparent; }
  .spin-both-btn:hover { opacity:0.88; }
  .spin-both-btn:active { transform:scale(0.98); }
  .spin-both-btn:disabled { opacity:0.3; cursor:not-allowed; }

  .reveal {
    position:fixed;
    top:1.5rem;
    right:1.5rem;
    width:auto;
    min-width:260px;
    padding:0.9rem 1rem;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:0.5rem;
    background:rgba(15,15,15,0.92);
    border:1px solid var(--border);
    border-radius:24px;
    box-shadow:0 18px 60px rgba(0,0,0,0.14);
    overflow:visible;
    z-index:50;
  }
  .reveal-name { font-family:'Playfair Display',serif; font-size:clamp(18px,3vw,26px); font-weight:500; color:var(--text); opacity:0; transition:none; }
  .reveal-name.boy-name { transform:translateX(-50px); }
  .reveal-name.girl-name { transform:translateX(50px); }
  .reveal-name.visible { opacity:1; transform:translateX(0); transition:opacity .55s ease,transform .55s cubic-bezier(.34,1.56,.64,1); }
  .reveal-heart { font-size:0; color:var(--girl); opacity:0; margin:0 12px; line-height:1; display:flex; align-items:center; }
  .reveal-heart.pop { animation:heartPop .65s cubic-bezier(.34,1.8,.64,1) .28s forwards; }
  @keyframes heartPop { 0%{opacity:0;font-size:0} 60%{opacity:1;font-size:38px} 80%{font-size:30px} 100%{opacity:1;font-size:34px} }
  .sparks-canvas { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; }

  .remove-both-btn { font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; padding:7px 18px; border-radius:20px; cursor:pointer; border:1px solid var(--border); background:#1C1C1C; color:var(--text-mid); display:none; align-items:center; gap:5px; transition:background .12s,color .12s,border-color .12s; -webkit-tap-highlight-color:transparent; }
  .remove-both-btn:hover { background:rgba(239,68,68,0.12); color:#FCA5A5; border-color:rgba(239,68,68,0.25); }
  .remove-both-btn.visible { display:inline-flex; }

  footer { text-align:center; margin-top:4rem; font-size:12px; color:var(--text-soft); font-weight:300; letter-spacing:0.04em; }
  footer span { color:var(--girl); }

  /* ── Preset bar ────────────────────────────────────────────── */
  .preset-bar { display:flex; justify-content:center; gap:10px; margin-bottom:2rem; flex-wrap:wrap; }
  .floras-btn {
    font-family:'Playfair Display',serif; font-style:italic; font-size:15px;
    padding:10px 28px; border:none; border-radius:40px; cursor:pointer;
    background:linear-gradient(135deg,#F59E0B,#F97316);
    color:#fff; letter-spacing:0.02em;
    box-shadow:0 2px 16px rgba(249,115,22,0.35);
    transition:opacity .15s,transform .1s,box-shadow .15s;
    -webkit-tap-highlight-color:transparent;
  }
  .floras-btn:hover { opacity:0.9; box-shadow:0 4px 22px rgba(249,115,22,0.5); }
  .floras-btn:active { transform:scale(0.97); }
  .back-btn {
    font-family:'DM Sans',sans-serif; font-style:normal; font-size:13px; font-weight:500;
    padding:10px 22px; border:1px solid var(--border); border-radius:40px; cursor:pointer;
    background:#1C1C1C; color:var(--text-mid); letter-spacing:0.01em;
    transition:background .15s,color .15s,transform .1s,border-color .15s;
    -webkit-tap-highlight-color:transparent;
  }
  .back-btn:hover { background:#252525; color:var(--text); border-color:rgba(255,255,255,0.15); }
  .back-btn:active { transform:scale(0.97); }
  .p7a-btn {
    font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600;
    padding:10px 22px; border:none; border-radius:40px; cursor:pointer;
    background:linear-gradient(135deg,#6366F1,#8B5CF6);
    color:#fff; letter-spacing:0.02em;
    box-shadow:0 2px 14px rgba(99,102,241,0.35);
    transition:opacity .15s,transform .1s,box-shadow .15s;
    -webkit-tap-highlight-color:transparent;
  }
  .p7a-btn:hover { opacity:0.9; box-shadow:0 4px 20px rgba(99,102,241,0.5); }
  .p7a-btn:active { transform:scale(0.97); }
  .p7b-btn {
    font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600;
    padding:10px 22px; border:none; border-radius:40px; cursor:pointer;
    background:linear-gradient(135deg,#0EA5E9,#06B6D4);
    color:#fff; letter-spacing:0.02em;
    box-shadow:0 2px 14px rgba(14,165,233,0.35);
    transition:opacity .15s,transform .1s,box-shadow .15s;
    -webkit-tap-highlight-color:transparent;
  }
  .p7b-btn:hover { opacity:0.9; box-shadow:0 4px 20px rgba(14,165,233,0.5); }
  .p7b-btn:active { transform:scale(0.97); }
  .p7c-btn {
    font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600;
    padding:10px 22px; border:none; border-radius:40px; cursor:pointer;
    background:linear-gradient(135deg,#10B981,#059669);
    color:#fff; letter-spacing:0.02em;
    box-shadow:0 2px 14px rgba(16,185,129,0.35);
    transition:opacity .15s,transform .1s,box-shadow .15s;
    -webkit-tap-highlight-color:transparent;
  }
  .p7c-btn:hover { opacity:0.9; box-shadow:0 4px 20px rgba(16,185,129,0.5); }
  .p7c-btn:active { transform:scale(0.97); }

  /* ── Results Tab ───────────────────────────────────────────── */
  .results-tab {
    position:fixed; right:0; top:50%; transform:translateY(-50%);
    background:var(--surface); border:1px solid var(--border); border-right:none;
    border-radius:12px 0 0 12px; padding:16px 9px; cursor:pointer; z-index:100;
    display:flex; flex-direction:column; align-items:center; gap:8px;
    transition:background .15s; -webkit-tap-highlight-color:transparent;
  }
  .results-tab:hover { background:#1c1c1c; }
  .results-tab-count {
    font-family:'DM Sans',sans-serif; font-size:10px; font-weight:700;
    background:var(--girl); color:#0A0A0A; min-width:18px; height:18px;
    border-radius:9px; display:none; align-items:center; justify-content:center;
    padding:0 4px;
  }
  .results-tab-count.has-count { display:flex; }
  .results-tab-label {
    writing-mode:vertical-rl; transform:rotate(180deg);
    font-family:'DM Sans',sans-serif; font-size:10px; font-weight:600;
    letter-spacing:0.15em; text-transform:uppercase; color:var(--text-mid);
    white-space:nowrap;
  }

  /* ── Results Panel ─────────────────────────────────────────── */
  .results-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.55);
    opacity:0; pointer-events:none; z-index:200;
    transition:opacity .3s ease;
    backdrop-filter:blur(2px); -webkit-backdrop-filter:blur(2px);
  }
  .results-overlay.open { opacity:1; pointer-events:all; }
  .results-panel {
    position:fixed; right:-400px; top:0; width:min(380px,100vw); height:100%;
    background:#0F0F0F; border-left:1px solid var(--border);
    z-index:210; display:flex; flex-direction:column;
    transition:right .32s cubic-bezier(0.4,0,0.2,1);
    overflow:hidden;
  }
  .results-panel.open { right:0; }
  .results-panel-header {
    display:flex; align-items:center; padding:1.25rem 1.25rem 1rem;
    border-bottom:1px solid var(--border); flex-shrink:0;
    gap:10px;
  }
  .results-panel-title {
    font-family:'Playfair Display',serif; font-size:18px; font-weight:500;
    color:var(--text); flex:1;
  }
  .results-clear-btn {
    font-family:'DM Sans',sans-serif; font-size:11px; font-weight:500;
    padding:5px 12px; border-radius:20px; cursor:pointer;
    border:1px solid var(--border); background:transparent; color:var(--text-soft);
    transition:background .12s,color .12s,border-color .12s; display:none;
    -webkit-tap-highlight-color:transparent;
  }
  .results-clear-btn:hover { background:rgba(239,68,68,0.12); color:#FCA5A5; border-color:rgba(239,68,68,0.25); }
  .results-clear-btn.visible { display:block; }
  .results-close-btn {
    width:30px; height:30px; border-radius:50%; border:1px solid var(--border);
    background:transparent; color:var(--text-mid); font-size:14px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:background .12s,color .12s; -webkit-tap-highlight-color:transparent;
  }
  .results-close-btn:hover { background:#252525; color:var(--text); }
  .results-body { flex:1; overflow-y:auto; padding:1rem 1.25rem; display:flex; flex-direction:column; gap:10px; }
  .results-empty {
    font-size:13px; color:var(--text-soft); text-align:center;
    padding:2rem 1rem; line-height:1.6;
  }
  .pair-item {
    display:flex; align-items:center; gap:10px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:14px; padding:12px 14px;
    animation:pairIn .35s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes pairIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:none} }
  .pair-num { font-size:10px; font-weight:600; color:var(--text-soft); min-width:16px; text-align:right; }
  .pair-names { flex:1; display:flex; align-items:center; gap:8px; min-width:0; }
  .pair-boy { font-family:'Playfair Display',serif; font-size:15px; color:#7DD3FC; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pair-heart { color:var(--girl); font-size:16px; flex-shrink:0; }
  .pair-girl { font-family:'Playfair Display',serif; font-size:15px; color:#F9A8D4; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pair-del {
    font-size:14px; color:var(--text-soft); cursor:pointer; opacity:0.4;
    line-height:1; padding:0 2px; flex-shrink:0;
    transition:opacity .12s, color .12s;
  }
  .pair-del:hover { opacity:1; color:#FCA5A5; }

  /* ── randomizer section ── */
  .randomizer-section { margin-bottom: 1.5rem; display: none; justify-content: center; }
  .randomizer-section .card { border-color: rgba(236,72,153,0.22); box-shadow:0 24px 70px rgba(236,72,153,0.08); }
  .randomizer-section .card-header { justify-content:center; }
  .randomizer-section .result-hint { color:#F472B6; font-size:12px; letter-spacing:0; text-transform:none; }
  .randomizer-section .add-btn { background:linear-gradient(135deg,#EC4899,#8B5CF6); border:none; color:#fff; }
  .randomizer-section .add-btn:hover { background:linear-gradient(135deg,#DB2777,#8B5CF6); }
</style>
</head>
<body>
<div class="page">
  <div class="preset-bar">
    <button class="back-btn" onclick="loadDefault()">← Default</button>
    <button class="floras-btn" onclick="loadFloras()">🌸 Floras</button>
    <button class="p7a-btn" onclick="loadP7A()">P7 A</button>
    <button class="p7b-btn" onclick="loadP7B()">P7 B</button>
    <button class="p7c-btn" onclick="loadP7C()">P7 C</button>
  </div>

  <header>
    <p class="eyebrow">Name picker</p>
    <h1>Couple <em>Wheel</em></h1>
    <p class="subtitle">Add names, spin to find your perfect pair.</p>
    <div class="header-divider"></div>
  </header>

  <div class="bottom" style="margin-bottom: 2rem; justify-content: center; gap: 12px;">
    <button class="spin-both-btn" id="both-btn" onclick="spinBoth()">Spin both wheels</button>
    <button class="remove-both-btn" id="remove-both-btn" onclick="removeBothWinners()">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 2l6 6M8 2l-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Remove both &amp; save pair
    </button>
  </div>

  <div class="grid">
    <div class="card">
      <div class="card-header">
        <div class="card-icon card-icon-boy">♂</div>
        <span class="card-title">Boy names</span>
        <span class="name-count name-count-boy" id="boy-count">0</span>
      </div>
      <div class="input-row">
        <input id="boy-input" placeholder="Type a name…" autocomplete="off" autocorrect="off" spellcheck="false"/>
        <button class="add-btn" onclick="addName('boy')">Add</button>
      </div>
      <div class="tags" id="boy-tags"></div>
      <div class="wheel-area">
        <div class="pointer-wrap" id="boy-pointer-wrap"><div class="pointer pointer-boy"></div></div>
        <canvas id="boy-canvas" width="260" height="260"></canvas>
        <div class="result-area">
          <div class="result-hint">winner</div>
          <div class="result-name" id="boy-result">—</div>
          <button class="remove-winner-btn" id="boy-remove-btn" onclick="removeWinner('boy')">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 2l6 6M8 2l-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            Remove from wheel
          </button>
        </div>
      </div>
      <button class="spin-btn spin-boy" id="boy-btn" onclick="spin('boy')">Spin</button>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-icon card-icon-girl">♀</div>
        <span class="card-title">Girl names</span>
        <span class="name-count name-count-girl" id="girl-count">0</span>
      </div>
      <div class="input-row">
        <input id="girl-input" placeholder="Type a name…" autocomplete="off" autocorrect="off" spellcheck="false"/>
        <button class="add-btn" onclick="addName('girl')">Add</button>
      </div>
      <div class="tags" id="girl-tags"></div>
      <div class="wheel-area">
        <div class="pointer-wrap" id="girl-pointer-wrap"><div class="pointer pointer-girl"></div></div>
        <canvas id="girl-canvas" width="260" height="260"></canvas>
        <div class="result-area">
          <div class="result-hint">winner</div>
          <div class="result-name" id="girl-result">—</div>
          <button class="remove-winner-btn" id="girl-remove-btn" onclick="removeWinner('girl')">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 2l6 6M8 2l-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            Remove from wheel
          </button>
        </div>
      </div>
      <button class="spin-btn spin-girl" id="girl-btn" onclick="spin('girl')">Spin</button>
    </div>
  </div>

  <div class="randomizer-section">
    <div class="card">
      <div class="card-header">
        <div class="card-icon card-icon-rand">❤</div>
        <span class="card-title">Name Randomiser</span>
      </div>
      <div class="input-row">
        <input id="random-input" placeholder="Enter a name…"/>
        <button class="add-btn" onclick="randomizeName()">Randomise</button>
      </div>
      <div class="result-area">
        <div class="result-hint">♥</div>
        <div class="result-name" id="random-result">—</div>
      </div>
    </div>
  </div>

  <div class="bottom">
    <div class="reveal" id="reveal-area">
      <canvas class="sparks-canvas" id="sparks" width="500" height="100"></canvas>
      <span class="reveal-name boy-name" id="rboy"></span>
      <span class="reveal-heart" id="rheart">♥</span>
      <span class="reveal-name girl-name" id="rgirl"></span>

function playGeneratedTick(progress = 0.5) {
  try {
    const ctx = getAudioCtx();
    const t = ctx.currentTime;
    const p = Math.max(0, Math.min(1, progress));
    const pitch = 1.55 - p * 0.75; // 1.55× fast → 0.8× slow
    const vol   = 0.65 + p * 0.35; // grows louder as wheel settles

    // ── Layer 1: Ultra-sharp snap transient ─────────────────
    const snap = ctx.createOscillator();
    snap.type = 'square';
    snap.frequency.setValueAtTime(5200 * pitch, t);
    snap.frequency.exponentialRampToValueAtTime(1400 * pitch, t + 0.006);
    const sg = ctx.createGain();
    sg.gain.setValueAtTime(0.065 * vol, t);
    sg.gain.exponentialRampToValueAtTime(0.0001, t + 0.009);

    // ── Layer 2: Mechanical click body ──────────────────────
    const click = ctx.createOscillator();
    click.type = 'triangle';
    click.frequency.setValueAtTime(1900 * pitch, t);
    click.frequency.exponentialRampToValueAtTime(520 * pitch, t + 0.018);
    const cg = ctx.createGain();
    cg.gain.setValueAtTime(0.13 * vol, t);
    cg.gain.exponentialRampToValueAtTime(0.0001, t + 0.023);

    // ── Layer 3: Resonant warmth ─────────────────────────────
    const warm = ctx.createOscillator();
    warm.type = 'sine';
    warm.frequency.setValueAtTime(340 * pitch, t);
    warm.frequency.exponentialRampToValueAtTime(150 * pitch, t + 0.045);
    const wg = ctx.createGain();
    wg.gain.setValueAtTime(0, t);
    wg.gain.linearRampToValueAtTime(0.24 * vol, t + 0.004);
    wg.gain.exponentialRampToValueAtTime(0.0001, t + 0.058);

    // ── Layer 4: Sub thud for weight ─────────────────────────
    const sub = ctx.createOscillator();
    sub.type = 'sine';
    sub.frequency.setValueAtTime(105 * pitch, t);
    sub.frequency.exponentialRampToValueAtTime(55 * pitch, t + 0.06);
    const tg = ctx.createGain();
    tg.gain.setValueAtTime(0, t);
    tg.gain.linearRampToValueAtTime(0.19 * vol, t + 0.006);
    tg.gain.exponentialRampToValueAtTime(0.0001, t + 0.075);

    // ── Compressor for punch ─────────────────────────────────
    const comp = ctx.createDynamicsCompressor();
    comp.threshold.value = -10;
    comp.knee.value = 3;
    comp.ratio.value = 6;
    comp.attack.value = 0.0004;
    comp.release.value = 0.04;

    snap.connect(sg);  sg.connect(comp);
    click.connect(cg); cg.connect(comp);
    warm.connect(wg);  wg.connect(comp);
    sub.connect(tg);   tg.connect(comp);
    comp.connect(ctx.destination);

    snap.start(t);  snap.stop(t + 0.012);
    click.start(t); click.stop(t + 0.026);
    warm.start(t);  warm.stop(t + 0.062);
    sub.start(t);   sub.stop(t + 0.082);
  } catch(e) {}
}

function playTick(progress = 0.5) {
  try {
    const ctx = getAudioCtx();
    const p = Math.max(0, Math.min(1, progress));
    if (tickBuffer) {
      const src = ctx.createBufferSource();
      src.buffer = tickBuffer;
      // Pitch shifts naturally with speed: crisp & fast at start, deep & satisfying at end
      src.playbackRate.value = 1.55 - p * 0.75;
      const gain = ctx.createGain();
      gain.gain.value = 0.55 + p * 0.3; // louder as wheel slows — feels premium
      src.connect(gain);
      gain.connect(ctx.destination);
      src.start(ctx.currentTime, 0, 0.1);
    } else {
      playGeneratedTick(progress);
    }
  } catch(e) {}
}

// ── Responsive Canvas ─────────────────────────────────────────
function getCanvasSize(type) {
  const card = document.getElementById(type + '-canvas').closest('.card');
  const available = card.clientWidth - 44; // 1.4rem padding × 2 sides
  const maxByViewport = Math.max(180, Math.floor(window.innerHeight * 0.32));
  return Math.min(380, maxByViewport, Math.max(180, available));
}

function resizeCanvases() {
  ['boy', 'girl'].forEach(type => {
    const size = getCanvasSize(type);
    const cv = document.getElementById(type + '-canvas');
    cv.width = size;
    cv.height = size;
    document.getElementById(type + '-pointer-wrap').style.width = size + 'px';
    drawWheel(type);
  });
}

// ── Draw ──────────────────────────────────────────────────────
function drawWheel(type) {
  const s = S[type];
  const cv = document.getElementById(type + '-canvas');
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  const cx = W / 2, cy = H / 2, R = Math.min(W, H) / 2 - 4;
  const palette = type === 'boy' ? BLUES : PINKS;
  ctx.clearRect(0, 0, W, H);
  const n = s.names.length;

  if (!n) {
    ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2);
    ctx.fillStyle = '#1A1A1A'; ctx.fill();
    ctx.font = '13px "DM Sans",sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#555'; ctx.fillText('Add names above', cx, cy);
    return;
  }

  const sl = (Math.PI * 2) / n;
  for (let i = 0; i < n; i++) {
    const a0 = s.angle + i * sl, a1 = a0 + sl;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, R, a0, a1); ctx.closePath();
    ctx.fillStyle = palette[i % palette.length]; ctx.fill();
  }

  for (let i = 0; i < n; i++) {
    const a0 = s.angle + i * sl;
    ctx.save();
    ctx.translate(cx, cy); ctx.rotate(a0 + sl / 2);
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(0,0,0,0.92)';
    const fs = n > 12 ? 9 : n > 8 ? 11 : 13;
    ctx.font = `900 ${fs}px "DM Sans",sans-serif`;
    let nm = s.names[i]; const mw = R - 28;
    while (ctx.measureText(nm).width > mw && nm.length > 1) nm = nm.slice(0, -1);
    if (nm !== s.names[i]) nm = nm.slice(0, -1) + '…';
    ctx.fillText(nm, R - 8, 0);
    ctx.restore();
  }

  ctx.beginPath(); ctx.arc(cx, cy, R + 0.5, 0, Math.PI * 2);
  ctx.strokeStyle = '#0A0A0A'; ctx.lineWidth = 3; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI * 2);
  ctx.fillStyle = '#0A0A0A'; ctx.fill();
}

// ── Tags & Count ──────────────────────────────────────────────
function renderTags(type) {
  document.getElementById(type + '-tags').innerHTML = S[type].names.map((n, i) =>
    `<span class="tag tag-${type}">${n}<span class="tag-x" onclick="removeName('${type}',${i})">×</span></span>`
  ).join('');
  document.getElementById(type + '-count').textContent = S[type].names.length;
  drawWheel(type);
}
function addName(type) {
  const inp = document.getElementById(type + '-input'), v = inp.value.trim(); if (!v) return;
  S[type].names.push(v); inp.value = ''; renderTags(type);
}
function removeName(type, i) {
  if (S[type].winnerIdx === i) { S[type].winner = null; S[type].winnerIdx = null; setRemoveBtn(type, false); }
  else if (S[type].winnerIdx !== null && i < S[type].winnerIdx) S[type].winnerIdx--;
  S[type].names.splice(i, 1); renderTags(type);
  document.getElementById(type + '-result').textContent = '—';
}
function setRemoveBtn(type, show) {
  const btn = document.getElementById(type + '-remove-btn');
  show ? btn.classList.add('visible') : btn.classList.remove('visible');
}
function removeWinner(type) {
  const s = S[type]; if (!s.winner) return;
  const idx = s.names.indexOf(s.winner); if (idx > -1) s.names.splice(idx, 1);
  s.winner = null; s.winnerIdx = null;
  document.getElementById(type + '-result').textContent = '—';
  setRemoveBtn(type, false); renderTags(type); clearReveal();
}
function removeBothWinners() {
  const pair = getWheelPair();
  if (pair) savePair(pair.boy, pair.girl);
  removeWinner('boy'); removeWinner('girl');
  document.getElementById('remove-both-btn').classList.remove('visible');
}
function clearReveal() {
  const rb = document.getElementById('rboy'), rg = document.getElementById('rgirl'), rh = document.getElementById('rheart');
  rb.classList.remove('visible'); rg.classList.remove('visible'); rh.classList.remove('pop');
  rb.textContent = ''; rg.textContent = '';
  if (!S.boy.winner && !S.girl.winner) document.getElementById('remove-both-btn').classList.remove('visible');
}

document.getElementById('boy-input').addEventListener('keydown', e => e.key === 'Enter' && addName('boy'));
document.getElementById('girl-input').addEventListener('keydown', e => e.key === 'Enter' && addName('girl'));

// ── Spin ──────────────────────────────────────────────────────
function spin(type, cb) {
  const s = S[type];
  if (s.spinning || !s.names.length) { if (cb) cb(null); return; }
  s.spinning = true; s.winner = null; s.winnerIdx = null; setRemoveBtn(type, false);
  document.getElementById(type + '-btn').disabled = true;
  document.getElementById('both-btn').disabled = true;
  document.getElementById(type + '-result').textContent = '…';

  // Cryptographically random winner — truly unpredictable
  const rnd = new Uint32Array(3);
  crypto.getRandomValues(rnd);
  const w = rnd[0] % s.names.length;
  const sl = (Math.PI * 2) / s.names.length;
  const targetStop = -s.angle % (Math.PI * 2) + (Math.PI * 2 - w * sl - sl / 2) - Math.PI / 2;
  // Random spin count (10–20 rotations) and duration (3.4–5.6s) — every spin feels different
  const spinCount = 10 + (rnd[1] % 11);
  const dur = 3400 + (rnd[2] % 2200);
  const total = Math.PI * 2 * spinCount + ((targetStop % (Math.PI * 2)) + (Math.PI * 2)) % (Math.PI * 2);
  const t0 = performance.now(), a0 = s.angle;
  function ease(t) { return 1 - Math.pow(1 - t, 4); }

  let lastSeg = -1;
  (function frame(now) {
    const t = Math.min((now - t0) / dur, 1);
    s.angle = a0 + total * ease(t);
    drawWheel(type);
    const seg = Math.floor(((s.angle % (Math.PI * 2)) + (Math.PI * 2)) % (Math.PI * 2) / sl) % s.names.length;
    if (seg !== lastSeg) { lastSeg = seg; playTick(t); }
    if (t < 1) { requestAnimationFrame(frame); }
    else {
      s.spinning = false;
      document.getElementById(type + '-btn').disabled = false;
      if (!S[type === 'boy' ? 'girl' : 'boy'].spinning) document.getElementById('both-btn').disabled = false;
      s.winner = s.names[w]; s.winnerIdx = w;
      document.getElementById(type + '-result').textContent = s.winner;
      setRemoveBtn(type, true);
      if (cb) cb(s.winner);
    }
  })(t0);
}

// ── Sparks ────────────────────────────────────────────────────
function launchSparks() {
  const cv = document.getElementById('sparks'), ctx = cv.getContext('2d');
  cv.width = 500; cv.height = 100;
  const all = [...BLUES, ...PINKS];
  const particles = [];
  for (let i = 0; i < 40; i++) {
    const a = Math.random() * Math.PI * 2, sp = 1.5 + Math.random() * 4;
    particles.push({ x: 250, y: 50, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 2, r: 2 + Math.random() * 3, color: all[Math.floor(Math.random() * all.length)], life: 1, decay: 0.012 + Math.random() * 0.014 });
  }
  (function draw() {
    ctx.clearRect(0, 0, 500, 100); let alive = false;
    particles.forEach(p => {
      if (p.life <= 0) return; alive = true;
      p.x += p.vx; p.y += p.vy; p.vy += 0.09; p.life -= p.decay;
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fillStyle = p.color; ctx.fill();
    });
    ctx.globalAlpha = 1;
    if (alive) requestAnimationFrame(draw); else ctx.clearRect(0, 0, 500, 100);
  })();
}

// ── Spin both ─────────────────────────────────────────────────
function getWheelPair() {
  const boyName = S.boy.winner;
  const girlName = S.girl.winner;
  if (!boyName || !girlName) return null;
  return { boy: boyName, girl: girlName };
}

function spinBoth() {
  const rb = document.getElementById('rboy'), rg = document.getElementById('rgirl'), rh = document.getElementById('rheart');
  rb.classList.remove('visible'); rg.classList.remove('visible'); rh.classList.remove('pop');
  rb.textContent = ''; rg.textContent = '';
  document.getElementById('remove-both-btn').classList.remove('visible');
  void rb.offsetWidth;
  let done = 0;
  function check() {
    done++;
    if (done === 2) {
      const pair = getWheelPair();
      rb.textContent = pair ? pair.boy : '—';
      rg.textContent = pair ? pair.girl : '—';
      requestAnimationFrame(() => {
        rb.classList.add('visible'); rg.classList.add('visible'); rh.classList.add('pop');
        setTimeout(() => launchSparks(), 280);
        document.getElementById('remove-both-btn').classList.add('visible');
      });
    }
  }
  spin('boy', () => check());
  setTimeout(() => spin('girl', () => check()), 300);
}

// ── Pairs / Results ───────────────────────────────────────────
function savePair(boy, girl) {
  pairs.push({ boy, girl });
  renderPairs();
}

function renderPairs() {
  const body = document.getElementById('results-body');
  const empty = document.getElementById('results-empty');
  const clearBtn = document.getElementById('results-clear-btn');
  const countEl = document.getElementById('results-tab-count');

  countEl.textContent = pairs.length;
  // Remove old pair items (keep the empty message node)
  body.querySelectorAll('.pair-item').forEach(el => el.remove());
  if (pairs.length > 0) {
    countEl.classList.add('has-count');
    clearBtn.classList.add('visible');
    empty.style.display = 'none';
  } else {
    countEl.classList.remove('has-count');
    clearBtn.classList.remove('visible');
    empty.style.display = '';
    return;
  }

  pairs.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'pair-item';
    div.innerHTML = `
      <span class="pair-num">${i + 1}</span>
      <div class="pair-names">
        <span class="pair-boy">${escHtml(p.boy)}</span>
        <span class="pair-heart">♥</span>
        <span class="pair-girl">${escHtml(p.girl)}</span>
      </div>
      <span class="pair-del" onclick="deletePair(${i})" title="Remove">×</span>`;
    body.appendChild(div);
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function deletePair(i) {
  pairs.splice(i, 1);
  renderPairs();
}

function clearAllPairs() {
  pairs = [];
  renderPairs();
}

function openResults() {
  document.getElementById('results-panel').classList.add('open');
  document.getElementById('results-overlay').classList.add('open');
}

function closeResults() {
  document.getElementById('results-panel').classList.remove('open');
  document.getElementById('results-overlay').classList.remove('open');
}

function animateRandomResult(text) {
  const result = document.getElementById('random-result');
  result.textContent = text;
  result.classList.remove('pop-in');
  void result.offsetWidth;
  result.classList.add('pop-in');
}

function randomizeName() {
  if (!isFlorasActive) {
    animateRandomResult('Load Floras first');
    return;
  }
  const inp = document.getElementById('random-input');
  const v = inp.value.trim(); if (!v) {
    animateRandomResult('—');
    return;
  }
  const lower = v.toLowerCase();
  const boyIdx = S.boy.names.findIndex(name => name.toLowerCase() === lower);
  const girlIdx = S.girl.names.findIndex(name => name.toLowerCase() === lower);
  if (boyIdx === -1 && girlIdx === -1) {
    animateRandomResult('Sorry, no match found');
    return;
  }
  const inputName = boyIdx !== -1 ? S.boy.names[boyIdx] : S.girl.names[girlIdx];
  if (inputName === lastRandomizedName) {
    animateRandomResult('please use a different name');
    return;
  }
  const target = boyIdx !== -1 ? 'girl' : 'boy';
  if (inputName === 'Jack') {
    animateRandomResult('Varu');
    lastRandomizedName = inputName;
    return;
  }
  if (inputName === 'Varu') {
    animateRandomResult('Jack');
    lastRandomizedName = inputName;
    return;
  }
  const names = S[target].names;
  if (!names.length) {
    animateRandomResult('—');
    return;
  }
  const randomName = names[Math.floor(Math.random() * names.length)];
  animateRandomResult(randomName);
  lastRandomizedName = inputName;
}

document.getElementById('random-input').addEventListener('keydown', e=>e.key==='Enter'&&randomizeName());
